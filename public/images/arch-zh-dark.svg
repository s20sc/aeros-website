<svg viewBox="0 0 720 560" xmlns="http://www.w3.org/2000/svg" style="font-family:'Noto Sans SC','Space Grotesk',system-ui,sans-serif;">

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="720" height="560" rx="16" fill="#0D1117"/>

  <!-- Title -->
  <text x="360" y="30" text-anchor="middle" font-size="15" font-weight="700" fill="#F1F5F9">
    AEROS 的定位：开放接入，不做替代
  </text>
  <text x="360" y="50" text-anchor="middle" font-size="11" fill="#64748B">
    任何智能体都可以提议，AEROS 决定什么可以在物理世界中执行
  </text>

  <!-- LAYER 1: User Command -->
  <rect x="220" y="68" width="280" height="40" rx="20" fill="#1A2332" stroke="#334155" stroke-width="1.5"/>
  <text x="360" y="93" text-anchor="middle" font-size="13" font-weight="600" fill="#94A3B8">用户指令</text>

  <!-- Arrow -->
  <line x1="360" y1="108" x2="360" y2="134" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- LAYER 2: Upper Cognition -->
  <rect x="60" y="138" width="600" height="86" rx="12" fill="rgba(245,158,11,0.06)" stroke="#F59E0B" stroke-width="1.5" stroke-opacity="0.4"/>
  <text x="360" y="160" text-anchor="middle" font-size="12" font-weight="700" fill="#F59E0B" letter-spacing="0.5">
    上层认知 &#x2014; Agent / 规划器 / 模型
  </text>

  <rect x="80" y="170" width="260" height="40" rx="8" fill="#1A2332" stroke="#D97706" stroke-width="1" stroke-opacity="0.3"/>
  <text x="210" y="195" text-anchor="middle" font-size="12" font-weight="600" fill="#FCD34D">OpenClaw 智能体</text>

  <rect x="380" y="170" width="260" height="40" rx="8" fill="#1A2332" stroke="#D97706" stroke-width="1" stroke-opacity="0.3"/>
  <text x="510" y="195" text-anchor="middle" font-size="12" font-weight="600" fill="#FCD34D">其他规划器 / 模型</text>

  <!-- Arrow with label -->
  <line x1="360" y1="224" x2="360" y2="260" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="270" y="234" width="180" height="18" rx="9" fill="#1A2332" stroke="#334155" stroke-width="1"/>
  <text x="360" y="247" text-anchor="middle" font-size="9" font-weight="500" fill="#64748B">任务计划 / 技能请求</text>

  <!-- LAYER 3: AEROS -->
  <rect x="60" y="264" width="600" height="136" rx="12" fill="rgba(0,102,255,0.06)" stroke="#0066FF" stroke-width="1.5" stroke-opacity="0.4"/>
  <text x="360" y="286" text-anchor="middle" font-size="13" font-weight="700" fill="#0066FF" letter-spacing="0.5">
    AEROS 治理与运行时
  </text>

  <rect x="80" y="298" width="130" height="50" rx="8" fill="#1A2332" stroke="#1E40AF" stroke-width="1" stroke-opacity="0.4"/>
  <text x="145" y="318" text-anchor="middle" font-size="11" font-weight="600" fill="#60A5FA">策略与合约</text>
  <text x="145" y="334" text-anchor="middle" font-size="9" fill="#475569">准入 &#x2022; 规则</text>

  <rect x="225" y="298" width="130" height="50" rx="8" fill="#1A2332" stroke="#1E40AF" stroke-width="1" stroke-opacity="0.4"/>
  <text x="290" y="318" text-anchor="middle" font-size="11" font-weight="600" fill="#60A5FA">安全与恢复</text>
  <text x="290" y="334" text-anchor="middle" font-size="9" fill="#475569">监控 &#x2022; 恢复</text>

  <rect x="370" y="298" width="130" height="50" rx="8" fill="#1A2332" stroke="#1E40AF" stroke-width="1" stroke-opacity="0.4"/>
  <text x="435" y="318" text-anchor="middle" font-size="11" font-weight="600" fill="#60A5FA">审计与回滚</text>
  <text x="435" y="334" text-anchor="middle" font-size="9" fill="#475569">追溯 &#x2022; 回退</text>

  <rect x="515" y="298" width="130" height="50" rx="8" fill="#1A2332" stroke="#1E40AF" stroke-width="1" stroke-opacity="0.4"/>
  <text x="580" y="318" text-anchor="middle" font-size="11" font-weight="600" fill="#60A5FA">ECM / 技能</text>
  <text x="580" y="334" text-anchor="middle" font-size="9" fill="#475569">能力包 &#x2022; 执行</text>

  <text x="360" y="382" text-anchor="middle" font-size="10" font-style="italic" fill="#3B82F6">
    准入与控制平面
  </text>

  <!-- Arrow with label -->
  <line x1="360" y1="400" x2="360" y2="432" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="276" y="408" width="168" height="18" rx="9" fill="#1A2332" stroke="#334155" stroke-width="1"/>
  <text x="360" y="421" text-anchor="middle" font-size="9" font-weight="500" fill="#64748B">受控执行</text>

  <!-- LAYER 4: ROS 2 / Robot -->
  <rect x="60" y="436" width="600" height="76" rx="12" fill="rgba(100,116,139,0.06)" stroke="#475569" stroke-width="1" stroke-opacity="0.3"/>
  <text x="360" y="458" text-anchor="middle" font-size="12" font-weight="700" fill="#94A3B8" letter-spacing="0.5">
    ROS 2 / 机器人 / 集群
  </text>

  <rect x="80" y="466" width="260" height="34" rx="7" fill="#1A2332" stroke="#334155" stroke-width="1"/>
  <text x="210" y="488" text-anchor="middle" font-size="11" font-weight="500" fill="#94A3B8">ROS 2 / 真机</text>

  <rect x="380" y="466" width="260" height="34" rx="7" fill="#1A2332" stroke="#334155" stroke-width="1"/>
  <text x="510" y="488" text-anchor="middle" font-size="11" font-weight="500" fill="#94A3B8">集群运维</text>

  <!-- Bottom quote -->
  <line x1="120" y1="528" x2="600" y2="528" stroke="#1E293B" stroke-width="1"/>
  <text x="360" y="550" text-anchor="middle" font-size="12" font-weight="600" font-style="italic" fill="#64748B">
    任何智能体都可以提议，AEROS 决定什么可以在物理世界中执行。
  </text>

</svg>
