<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 520" width="540" height="520">
  <defs>
    <linearGradient id="aerosBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0F1A2E"/>
      <stop offset="100%" stop-color="#0A0E17"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="540" height="520" rx="16" fill="url(#aerosBg)"/>

  <!-- AEROS bracket label -->
  <text x="22" y="30" fill="#0066FF" font-family="monospace" font-size="10" font-weight="600" letter-spacing="1.5">AEROS RUNTIME</text>

  <!-- Bracket line left -->
  <line x1="14" y1="42" x2="14" y2="310" stroke="#0066FF" stroke-width="2" opacity="0.3"/>
  <line x1="14" y1="42" x2="24" y2="42" stroke="#0066FF" stroke-width="2" opacity="0.3"/>
  <line x1="14" y1="310" x2="24" y2="310" stroke="#0066FF" stroke-width="2" opacity="0.3"/>

  <!-- Layer 5: Agent -->
  <rect x="32" y="42" width="476" height="48" rx="8" fill="rgba(0,102,255,0.08)" stroke="#0066FF" stroke-width="1"/>
  <circle cx="52" cy="66" r="4" fill="#0066FF" filter="url(#glow)"/>
  <text x="66" y="62" fill="#F1F5F9" font-family="sans-serif" font-size="13" font-weight="600">Agent</text>
  <text x="66" y="78" fill="#64748B" font-family="sans-serif" font-size="11">Decision-making, goals, memory</text>

  <!-- Connector -->
  <line x1="270" y1="90" x2="270" y2="102" stroke="#334155" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Layer 4: Governance -->
  <rect x="32" y="102" width="476" height="48" rx="8" fill="rgba(0,194,168,0.08)" stroke="#00C2A8" stroke-width="1"/>
  <circle cx="52" cy="126" r="4" fill="#00C2A8" filter="url(#glow)"/>
  <text x="66" y="122" fill="#F1F5F9" font-family="sans-serif" font-size="13" font-weight="600">Governance</text>
  <text x="66" y="138" fill="#64748B" font-family="sans-serif" font-size="11">Policy enforcement, audit, recovery</text>
  <rect x="380" y="112" width="118" height="24" rx="12" fill="rgba(0,194,168,0.12)" stroke="#00C2A8" stroke-width="0.5"/>
  <text x="439" y="129" fill="#00C2A8" font-family="monospace" font-size="9" text-anchor="middle" font-weight="500">ENTERPRISE</text>

  <!-- Connector -->
  <line x1="270" y1="150" x2="270" y2="162" stroke="#334155" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Layer 3: ECM Package -->
  <rect x="32" y="162" width="476" height="48" rx="8" fill="rgba(0,102,255,0.08)" stroke="#1E293B" stroke-width="1"/>
  <circle cx="52" cy="186" r="4" fill="#0066FF" filter="url(#glow)"/>
  <text x="66" y="182" fill="#F1F5F9" font-family="sans-serif" font-size="13" font-weight="600">ECM Package</text>
  <text x="66" y="198" fill="#64748B" font-family="sans-serif" font-size="11">Capability modules, contracts, versioning</text>
  <rect x="380" y="172" width="118" height="24" rx="12" fill="rgba(0,102,255,0.1)" stroke="#0066FF" stroke-width="0.5"/>
  <text x="439" y="189" fill="#3B82F6" font-family="monospace" font-size="9" text-anchor="middle" font-weight="500">APACHE 2.0</text>

  <!-- Connector -->
  <line x1="270" y1="210" x2="270" y2="222" stroke="#334155" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Layer 2: Runtime Core -->
  <rect x="32" y="222" width="476" height="48" rx="8" fill="rgba(0,102,255,0.08)" stroke="#1E293B" stroke-width="1"/>
  <circle cx="52" cy="246" r="4" fill="#0066FF" filter="url(#glow)"/>
  <text x="66" y="242" fill="#F1F5F9" font-family="sans-serif" font-size="13" font-weight="600">Runtime Core</text>
  <text x="66" y="258" fill="#64748B" font-family="sans-serif" font-size="11">Lifecycle, scheduling, execution, recovery</text>
  <rect x="380" y="232" width="118" height="24" rx="12" fill="rgba(0,102,255,0.1)" stroke="#0066FF" stroke-width="0.5"/>
  <text x="439" y="249" fill="#3B82F6" font-family="monospace" font-size="9" text-anchor="middle" font-weight="500">APACHE 2.0</text>

  <!-- Connector -->
  <line x1="270" y1="270" x2="270" y2="282" stroke="#334155" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Layer 1: Embodiment -->
  <rect x="32" y="282" width="476" height="48" rx="8" fill="rgba(0,102,255,0.04)" stroke="#1E293B" stroke-width="1"/>
  <circle cx="52" cy="306" r="4" fill="#334155"/>
  <text x="66" y="302" fill="#94A3B8" font-family="sans-serif" font-size="13" font-weight="600">Embodiment</text>
  <text x="66" y="318" fill="#64748B" font-family="sans-serif" font-size="11">Hardware abstraction, sensors, actuators</text>

  <!-- Divider -->
  <line x1="32" y1="350" x2="508" y2="350" stroke="#1E293B" stroke-width="1"/>
  <text x="270" y="370" fill="#64748B" font-family="sans-serif" font-size="10" text-anchor="middle" letter-spacing="0.5">▲ AEROS runs on top of ▼</text>

  <!-- ROS 2 -->
  <rect x="32" y="388" width="476" height="44" rx="8" fill="rgba(100,116,139,0.08)" stroke="#334155" stroke-width="1"/>
  <text x="52" y="415" fill="#94A3B8" font-family="sans-serif" font-size="13" font-weight="600">ROS 2</text>
  <text x="496" y="415" fill="#64748B" font-family="sans-serif" font-size="11" text-anchor="end">Communication middleware</text>

  <!-- Connector -->
  <line x1="270" y1="432" x2="270" y2="444" stroke="#334155" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Linux -->
  <rect x="32" y="444" width="476" height="44" rx="8" fill="rgba(100,116,139,0.04)" stroke="#1E293B" stroke-width="1"/>
  <text x="52" y="471" fill="#64748B" font-family="sans-serif" font-size="13" font-weight="600">Linux / RTOS</text>
  <text x="496" y="471" fill="#475569" font-family="sans-serif" font-size="11" text-anchor="end">Operating system</text>

  <!-- Analogy annotation -->
  <text x="270" y="510" fill="#475569" font-family="sans-serif" font-size="10" text-anchor="middle" font-style="italic">Linux &#x2192; Kubernetes  &#x2248;  ROS 2 &#x2192; AEROS</text>
</svg>
